<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚礼猜成语游戏 🎊</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --deep-red: #8b1a1a;
    --cream: #fdf6e3;
    --light-gold: #f0d080;
    --dark: #2a1a0e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--deep-red);
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.15) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.04'%3E%3Cpath d='M30 0L60 30L30 60L0 30z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    color: var(--cream);
    padding: 20px;
  }

  .corner-decor { position: fixed; font-size: 3rem; opacity: 0.15; pointer-events: none; }
  .corner-decor.tl { top: 10px; left: 10px; }
  .corner-decor.tr { top: 10px; right: 10px; transform: scaleX(-1); }
  .corner-decor.bl { bottom: 10px; left: 10px; transform: scaleY(-1); }
  .corner-decor.br { bottom: 10px; right: 10px; transform: scale(-1); }

  .main-card {
    background: linear-gradient(145deg, rgba(253,246,227,0.97), rgba(240,208,128,0.9));
    border: 3px solid var(--gold);
    border-radius: 20px;
    padding: 40px 35px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 0 6px rgba(139,26,26,0.5), 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.6);
    color: var(--dark);
    position: relative;
  }

  .main-card::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 14px;
    pointer-events: none;
  }

  .header-icon { font-size: 2.5rem; margin-bottom: 8px; display: block; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  .game-title { font-family: 'Ma Shan Zheng', cursive; font-size: 2rem; color: var(--deep-red); letter-spacing: 4px; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #8b6a3a; letter-spacing: 2px; margin-bottom: 30px; }

  .round-badge {
    display: inline-block;
    background: var(--deep-red);
    color: var(--light-gold);
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.1rem;
    padding: 6px 24px;
    border-radius: 50px;
    letter-spacing: 3px;
    margin-bottom: 28px;
    border: 2px solid var(--gold);
    transition: all 0.5s ease;
  }

  .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin: 24px 0; }

  .emoji-cell {
    background: white;
    border: 2px solid var(--gold);
    border-radius: 14px;
    padding: 18px 8px;
    font-size: 2.2rem;
    line-height: 1;
    box-shadow: 0 4px 12px rgba(139,26,26,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: default;
  }

  .emoji-cell:hover { transform: scale(1.12) rotate(-2deg); }

  .emoji-cell.reveal { animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  @keyframes popIn { 0% { transform: scale(0) rotate(-20deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }

  .hint-text { font-size: 0.88rem; color: #7a5c2a; margin: 10px 0 0; font-style: italic; letter-spacing: 1px; }
  .divider { width: 60px; height: 2px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 22px auto; }
  .instruction { font-size: 0.9rem; color: #6b4f2a; line-height: 1.8; letter-spacing: 1px; }
  .instruction strong { color: var(--deep-red); font-size: 1rem; }

  .waiting-emoji { font-size: 4rem; display: block; animation: pulse 2s ease-in-out infinite; margin-bottom: 16px; }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }

  .waiting-title { font-family: 'Ma Shan Zheng', cursive; font-size: 1.8rem; color: var(--deep-red); letter-spacing: 4px; margin-bottom: 10px; }
  .waiting-sub { font-size: 0.9rem; color: #8b6a3a; letter-spacing: 2px; }

  .answer-section { display: none; margin-top: 16px; padding: 16px; background: rgba(139,26,26,0.06); border-radius: 12px; border: 1px dashed var(--gold); }
  .answer-section.show { display: block; animation: fadeIn 0.5s ease; }
  .answer-label { font-size: 0.8rem; color: #8b6a3a; letter-spacing: 2px; margin-bottom: 8px; }
  .answer-text { font-family: 'Ma Shan Zheng', cursive; font-size: 1.6rem; color: var(--deep-red); letter-spacing: 6px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  #finished-screen { display: none; text-align: center; }
  .congrats-emoji { font-size: 3.5rem; display: block; margin-bottom: 12px; animation: spin 1s ease-out; }
  @keyframes spin { from { transform: rotate(-180deg) scale(0); } to { transform: rotate(0) scale(1); } }
  .congrats-title { font-family: 'Ma Shan Zheng', cursive; font-size: 2rem; color: var(--deep-red); letter-spacing: 4px; }
  .fireworks { font-size: 2rem; animation: sparkle 1.5s ease-in-out infinite alternate; letter-spacing: 8px; display: block; margin: 12px 0; }
  @keyframes sparkle { from { opacity: 0.6; transform: scale(0.95); } to { opacity: 1; transform: scale(1.05); } }

  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4caf50; margin-right: 6px; animation: blink 2s ease-in-out infinite; vertical-align: middle; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .status-bar { position: fixed; bottom: 16px; right: 16px; background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.7); font-size: 0.72rem; padding: 6px 12px; border-radius: 20px; letter-spacing: 1px; }
</style>
</head>
<body>
<div style="position:fixed; top:0; left:0; right:0; text-align:center; padding:10px 20px; z-index:100; pointer-events:none;">
  <div style="font-family:'Georgia','Garamond',serif; color:rgba(255,255,255,0.9); font-size:1.1rem; letter-spacing:4px; text-shadow:0 1px 6px rgba(0,0,0,0.5);">
    Terry &amp; Rebecca
  </div>
  <div style="font-size:0.7rem; color:rgba(240,208,128,0.8); letter-spacing:3px; margin-top:2px;">
    Wedding Game · March 15, 2026
  </div>
</div>
<div class="corner-decor tl">🌸</div>
<div class="corner-decor tr">🌸</div>
<div class="corner-decor bl">🌺</div>
<div class="corner-decor br">🌺</div>

<div class="main-card">
  <span class="header-icon">💑</span>
  <div class="game-title">猜成语游戏</div>
  <div class="subtitle">— 婚礼互动小游戏 —</div>

  <div id="waiting-screen">
    <span class="waiting-emoji">🎊</span>
    <div class="waiting-title">等待游戏开始</div>
    <div class="waiting-sub">请等候主持人开始第一轮…</div>
  </div>

  <div id="game-screen" style="display:none;">
    <div class="round-badge" id="round-label">第一轮</div>
    <div class="emoji-grid" id="emoji-grid"></div>
    <p class="hint-text">💡 8个emoji对应两个四字成语，emoji顺序为随机排列，先猜出来有神秘礼品！</p>
    <div class="divider"></div>
    <div class="instruction"><strong>🏆 规则</strong><br>猜出两个成语后<br>举手告诉主持人答案</div>
    <div class="answer-section" id="answer-section">
      <div class="answer-label">✨ 答案揭晓</div>
      <div class="answer-text" id="answer-text"></div>
    </div>
  </div>

  <div id="finished-screen">
    <span class="congrats-emoji">🥂</span>
    <div class="congrats-title">游戏结束！</div>
    <span class="fireworks">🎉 🎊 🎈</span>
    <div class="instruction">感谢所有宾客的参与<br>祝新人百年好合！</div>
  </div>
</div>

<div class="status-bar"><span class="status-dot"></span></div>

<!-- 题目数据 -->
<script src="rounds.js"></script>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC9Zk7-UUL-209FgLQKwT4DtTFfJNxfruM",
    authDomain: "wedding-emoji-game.firebaseapp.com",
    projectId: "wedding-emoji-game",
    storageBucket: "wedding-emoji-game.firebasestorage.app",
    messagingSenderId: "1035601415042",
    appId: "1:1035601415042:web:5ec4af80ca6cf3a588dd9b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const gameRef = ref(db, 'wedding-game/state');

  let currentRound = -1;

  function showWaiting() {
    document.getElementById('waiting-screen').style.display = 'block';
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('finished-screen').style.display = 'none';
  }

  function showRound(roundIndex, showAnswer) {
    document.getElementById('waiting-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    document.getElementById('finished-screen').style.display = 'none';

    const round = ROUNDS[roundIndex];
    document.getElementById('round-label').textContent = round.label;

    if (roundIndex !== currentRound) {
      const grid = document.getElementById('emoji-grid');
      grid.innerHTML = '';
      round.emojis.forEach((e, i) => {
        const cell = document.createElement('div');
        cell.className = 'emoji-cell reveal';
        cell.textContent = e;
        cell.style.animationDelay = (i * 0.08) + 's';
        grid.appendChild(cell);
      });
      currentRound = roundIndex;
    }

    const answerSection = document.getElementById('answer-section');
    document.getElementById('answer-text').textContent = round.answer;
    answerSection.classList.toggle('show', showAnswer === true);
  }

  function showFinished() {
    document.getElementById('waiting-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('finished-screen').style.display = 'block';
  }

  onValue(gameRef, (snapshot) => {
    const state = snapshot.val();
    if (!state) { showWaiting(); return; }
    if (state.finished) { showFinished(); }
    else if (state.round >= 0 && state.round < ROUNDS.length) { showRound(state.round, state.showAnswer || false); }
    else { showWaiting(); }
  });
</script>
</body>
</html>
